name: ci

# Least-privilege token: CI only needs to read the repo.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.26.4"

jobs:
  test:
    name: test (default / pure Go)
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit hashes (supply-chain hardening); credential
      # persistence disabled since no job pushes back to the repo.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@f111f3307d8850f501ac008e886ac0a9122e3d88 # v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race ./...
      - name: Build (default, pure Go)
        run: go build ./...

  gui-linux:
    name: gui (ebiten, Linux smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@f111f3307d8850f501ac008e886ac0a9122e3d88 # v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install GPU/windowing dev headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libxrandr-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxxf86vm-dev xvfb
      - name: Build GUI
        env:
          CGO_ENABLED: "1"
        run: go build -tags ebiten ./...
      - name: Vet GUI
        env:
          CGO_ENABLED: "1"
        run: go vet -tags ebiten ./...
      - name: Test GUI update-banner path (race)
        env:
          CGO_ENABLED: "1"
        run: xvfb-run -a go test -race -tags ebiten ./internal/render/...

  gui-macos:
    name: gui (ebiten, macOS Apple Silicon — release target)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@f111f3307d8850f501ac008e886ac0a9122e3d88 # v5.0.2
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build GUI (cgo, darwin/arm64)
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: go build -tags ebiten ./cmd/wisp
      - name: Test GUI update-banner path
        env:
          CGO_ENABLED: "1"
        run: go test -tags ebiten ./internal/render/...
