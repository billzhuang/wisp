name: release

# Continuous delivery. Pushing a semver tag (v1.2.3) builds the wisp binaries
# and a checksums file and publishes them as a GitHub Release. The in-app
# updater (internal/update) reads exactly these asset names and verifies them
# against the checksums file, so a tagged release becomes a one-click
# ("press Ctrl+U" / `wisp -update`) upgrade.
#
# Target: Apple Silicon macOS. The GUI (Ebitengine) build needs cgo + the macOS
# frameworks, so it must build on a native Apple-Silicon runner — it cannot be
# cross-compiled. We publish two flavors, each of which self-updates to its own
# asset (see cmd/wisp/flavor_*.go):
#   wisp-gui_darwin_arm64  — the GPU terminal app (primary)
#   wisp_darwin_arm64      — the pure-Go stdio/CLI build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload assets

jobs:
  build:
    name: build (macOS Apple Silicon)
    runs-on: macos-15 # newest macOS, Apple Silicon
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0 # needed to read tag annotations and git log for release notes
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build GUI (Ebitengine, cgo)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: |
          version="${GITHUB_REF_NAME#v}"
          go build -trimpath -tags ebiten \
            -ldflags "-s -w -X github.com/billzhuang/wisp/internal/version.Version=${version}" \
            -o "wisp-gui_darwin_arm64" ./cmd/wisp

      - name: Build CLI (pure Go)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/billzhuang/wisp/internal/version.Version=${version}" \
            -o "wisp_darwin_arm64" ./cmd/wisp

      - name: Ad-hoc codesign (so Gatekeeper doesn't mark the app "damaged")
        run: |
          codesign --sign - --force --timestamp=none wisp-gui_darwin_arm64
          codesign --sign - --force --timestamp=none wisp_darwin_arm64
          # NOTE: ad-hoc signing is not notarization. On first launch users may
          # still need: Control-click → Open, or `xattr -d com.apple.quarantine`.

      - name: Checksums
        run: |
          version="${GITHUB_REF_NAME#v}"
          shasum -a 256 wisp-gui_darwin_arm64 wisp_darwin_arm64 > "wisp_${version}_checksums.txt"
          cat "wisp_${version}_checksums.txt"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"

          # Use the annotated tag body as release notes (written by create-release.yml).
          # Fall back to a git-log summary for manually-pushed lightweight tags.
          git for-each-ref "refs/tags/${GITHUB_REF_NAME}" \
            --format='%(contents)' > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            last=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
            if [ -n "$last" ]; then
              printf '## Changes since %s\n\n' "$last" > /tmp/notes.md
              git log "${last}..${GITHUB_REF_NAME}" \
                --pretty='format:- %s (%h)' --no-merges >> /tmp/notes.md
            fi
          fi

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file /tmp/notes.md \
            wisp-gui_darwin_arm64 \
            wisp_darwin_arm64 \
            "wisp_${version}_checksums.txt"

  # Keep the Homebrew tap in sync. This repo is itself the tap: committing
  # Formula/wisp.rb to the default branch lets users run
  # `brew install billzhuang/wisp/wisp` — no separate homebrew-wisp repo needed.
  # Runs as its own job (needs: build) so a hiccup here can never fail the
  # release itself; the formula is regenerated from the published checksums by
  # cmd/genbrew so it can't drift from the assets.
  brew:
    name: update Homebrew tap formula
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the regenerated formula to the default branch
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # commit the formula to the default branch, not the tag
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Render and commit Formula/wisp.rb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/wisp_darwin_arm64"
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            --pattern "wisp_${version}_checksums.txt" --output checksums.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Regenerate the formula on top of the freshest origin/main each
          # attempt and push; if a concurrent push lands first, reset to the new
          # tip and retry. Regenerating wholesale means there is never a merge to
          # resolve — the formula is a pure function of this release's assets.
          pushed=
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --quiet --hard origin/main
            go run ./cmd/genbrew -version "${version}" -url "${url}" \
              -checksums checksums.txt -out Formula/wisp.rb
            git add Formula/wisp.rb
            if git diff --cached --quiet; then
              echo "formula already up to date"
              pushed=1
              break
            fi
            git commit -m "brew: update formula to ${version}"
            if git push origin HEAD:main; then
              pushed=1
              break
            fi
            echo "push lost a race (attempt ${attempt}); retrying on the new tip"
            sleep 3
          done
          rm -f checksums.txt
          if [ -z "${pushed}" ]; then
            echo "::error::could not update the Homebrew formula after retries" >&2
            exit 1
          fi
